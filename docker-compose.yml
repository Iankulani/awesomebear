version: '3.8'

services:
  awesomebear:
    build: .
    container_name: awesomebear
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "8000-8100:8000-8100"
    volumes:
      # Persist data
      - awesomebear-data:/home/bear/.awesomebear
      # Mount for custom files
      - ./custom:/app/custom
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=UTC
    networks:
      - awesomebear-net
    cap_add:
      - NET_ADMIN
      - NET_RAW
    security_opt:
      - seccomp:unconfined
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Optional: PostgreSQL for advanced logging
  postgres:
    image: postgres:15
    container_name: awesomebear-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: awesomebear
      POSTGRES_USER: bear
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - awesomebear-net
    profiles:
      - advanced

  # Optional: Redis for caching
  redis:
    image: redis:7-alpine
    container_name: awesomebear-redis
    restart: unless-stopped
    networks:
      - awesomebear-net
    profiles:
      - advanced

volumes:
  awesomebear-data:
  postgres-data:

networks:
  awesomebear-net:
    driver: bridge