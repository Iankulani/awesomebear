version: '3.8'

services:
  awesome-bear:
    build: .
    image: awesome-bear:latest
    container_name: awesome-bear
    hostname: awesome-bear
    ports:
      - "8080:8080"
      - "8080:8080/udp"
    volumes:
      - awesome-bear-data:/app/.awesomebear
      - awesome-bear-reports:/app/reports
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=UTC
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - security-net

volumes:
  awesome-bear-data:
    driver: local
  awesome-bear-reports:
    driver: local

networks:
  security-net:
    driver: bridge
